<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ArchView</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fullscreen" id="screen-loading">
  <div class="spinner"></div>
  <div class="fs-title">Yuklanmoqda</div>
  <div class="fs-sub" id="loading-msg">Ma'lumotlar olinmoqda...</div>
</div>

<div class="fullscreen" id="screen-error" style="display:none">
  <div style="font-size:32px;margin-bottom:12px">⚠️</div>
  <div class="fs-title" id="err-title">Xatolik</div>
  <div class="fs-sub" id="err-msg"></div>
  <div id="err-detail" class="err-code" style="display:none"></div>
  <button class="ubtn" onclick="location.reload()">Qayta urinish</button>
</div>

<div id="viewer">

  <!-- ===== BOSH EKRAN (qora, canvas) ===== -->
  <div id="screen-home">

    <div class="home-topbar">
      <div class="tb-row1">
        <div class="brand-pill" id="brand-name">ARCHVIEW</div>
        <div class="proj-title" id="proj-name">—</div>
      </div>
      <div class="tb-row2">
        <div class="owner-row">
          <div class="owner-av">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="owner-txt" id="owner-name">—</span>
        </div>
        <div class="tb-stats">
          <div class="tbstat"><div class="tbstat-v" id="s-area">—</div><div class="tbstat-l">m²</div></div>
          <div class="tbstat"><div class="tbstat-v" id="s-rooms">—</div><div class="tbstat-l">xona</div></div>
        </div>
      </div>
    </div>

    <div class="home-toolbar">
      <div class="floor-tabs" id="floor-tabs"></div>
      <div class="toolbar-right">
        <button class="map-btn" onclick="openMap()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
            <line x1="8" y1="2" x2="8" y2="18"/>
            <line x1="16" y1="6" x2="16" y2="22"/>
          </svg>
          Xarita
        </button>
        <div class="vtoggle" id="vtoggle" style="display:none">
          <button class="vbtn active" id="btn-25d" onclick="setView('2.5d')">2.5D</button>
          <button class="vbtn" id="btn-2d" onclick="setView('2d')">2D</button>
        </div>
      </div>
    </div>

    <div class="canvas-area" id="canvas-area">
      <canvas id="cv"></canvas>
      <div class="zoom-hint" id="zoom-hint">✦ ikki barmoq — kattalashtirish</div>
    </div>

    <div class="room-strip" id="home-strip"></div>

  </div>

  <!-- ===== XARITA EKRANI ===== -->
  <div id="screen-map">

    <div class="map-topbar">
      <button class="map-back-btn" onclick="closeMap()">←</button>
      <div class="map-topbar-name" id="map-title">Xarita</div>
    </div>

    <div class="map-wrap">
      <div id="leaflet-map"></div>
    </div>

  </div>

</div>

<!-- OVERLAY + DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle-wrap" onclick="closeDrawer()">
    <div class="drawer-handle"></div>
  </div>
  <div class="drawer-img-wrap" id="drawer-img-wrap">
    <div class="drawer-img-placeholder" id="drawer-img-placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span>Render rasm yo'q</span>
    </div>
    <img id="drawer-img" class="drawer-img loading" alt="render"
      onload="this.classList.remove('loading')"
      onerror="this.style.display='none'">
    <div class="drawer-img-badge" id="drawer-img-badge" style="display:none">RENDER</div>
  </div>
  <div class="drawer-scroll">
    <div class="dw-header">
      <div>
        <div class="dw-accent" id="dw-accent"></div>
        <div class="dw-name" id="dw-name">—</div>
        <div class="dw-type" id="dw-type">—</div>
      </div>
      <button class="dw-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="dw-grid">
      <div class="dw-cell"><div class="dw-cell-lbl">Maydon</div><div class="dw-cell-val" id="dw-area">—</div></div>
      <div class="dw-cell"><div class="dw-cell-lbl">O'lcham</div><div class="dw-cell-val" id="dw-size">—</div></div>
      <div class="dw-cell"><div class="dw-cell-lbl">Deraza</div><div class="dw-cell-val" id="dw-win">—</div></div>
      <div class="dw-cell"><div class="dw-cell-lbl">Eshik</div><div class="dw-cell-val" id="dw-door">—</div></div>
    </div>
    <div class="dw-features" id="dw-features"></div>
    <div class="dw-desc" id="dw-desc"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
