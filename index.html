<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ArchView</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0f;--bg2:#161617;--bg3:#1e1e20;--border:#2a2a2e;--accent:#e8c97a;--text:#f0ede6;--text2:#8a8680;--text3:#4a4845}
html,body{height:100%;overflow:hidden;touch-action:none}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

.fullscreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:var(--bg);z-index:999}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.fs-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.fs-sub{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px;white-space:pre-line;max-width:340px}
.err-code{font-family:'Courier New',monospace;font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:10px 0;text-align:left;color:var(--text2);line-height:1.7;max-width:340px;word-break:break-all}
.btn{background:none;border:1px solid var(--border);color:var(--text2);font-family:'Outfit',sans-serif;font-size:13px;padding:9px 22px;border-radius:10px;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}

/* VIEWER */
#viewer{display:none;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px}
.topbar-row1{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.brand-name{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);flex-shrink:0;padding:3px 8px;border:1px solid rgba(232,201,122,.3);border-radius:5px}
.proj-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-row2{display:flex;align-items:center;justify-content:space-between}
/* OWNER NAME */
.owner-name{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px}
.owner-icon{width:18px;height:18px;border-radius:50%;background:rgba(232,201,122,.15);border:1px solid rgba(232,201,122,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-stats{display:flex;gap:6px}
.tstat{background:var(--bg3);border-radius:7px;padding:4px 8px;text-align:center}
.tstat-val{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent)}
.tstat-lbl{font-size:9px;color:var(--text2)}

/* TOOLBAR */
.toolbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:7px 14px;gap:8px;border-bottom:1px solid var(--border);background:var(--bg)}
.floor-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1}
.floor-tabs::-webkit-scrollbar{display:none}
.floor-tab{flex-shrink:0;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:'Outfit',sans-serif;font-size:11px;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .2s}
.floor-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(232,201,122,.06)}
.view-toggle{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:2px;flex-shrink:0}
.view-btn{background:none;border:none;color:var(--text2);font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .2s}
.view-btn.active{background:var(--bg3);color:var(--accent)}

/* CANVAS */
.canvas-area{flex:1;position:relative;overflow:hidden;background:var(--bg);touch-action:none}
canvas{position:absolute;top:0;left:0;touch-action:none}
.zoom-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.18);pointer-events:none;white-space:nowrap;transition:opacity .5s}

/* ROOM STRIP */
.room-strip{flex-shrink:0;display:flex;gap:7px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border);background:var(--bg2)}
.room-strip::-webkit-scrollbar{display:none}
.room-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:6px 10px;cursor:pointer;transition:all .15s}
.room-chip:active{transform:scale(.96)}
.room-chip.active{border-color:var(--accent);background:rgba(232,201,122,.07)}
.room-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.room-chip-name{font-size:11px;font-weight:500;white-space:nowrap}
.room-chip-area{font-size:10px;color:var(--text2);white-space:nowrap}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.show{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:51;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:75vh;overflow-y:auto}
.drawer.show{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.drawer-inner{padding:16px 20px 32px}
.drawer-accent{width:32px;height:4px;border-radius:2px;margin-bottom:10px}
.drawer-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:2px}
.drawer-type{font-size:11px;color:var(--text2);margin-bottom:14px}
.drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.drawer-cell{background:var(--bg3);border-radius:10px;padding:10px 12px}
.drawer-cell-lbl{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.drawer-cell-val{font-size:14px;font-weight:500}
.drawer-desc{font-size:13px;color:var(--text2);line-height:1.6;border-top:1px solid var(--border);padding-top:12px}
.drawer-close{float:right;background:var(--bg3);border:none;color:var(--text2);width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:-4px}
</style>
</head>
<body>

<div class="fullscreen" id="screen-loading">
  <div class="spinner"></div>
  <div class="fs-title">Yuklanmoqda</div>
  <div class="fs-sub" id="loading-msg">Ma'lumotlar olinmoqda...</div>
</div>

<div class="fullscreen" id="screen-error" style="display:none">
  <div style="font-size:32px;margin-bottom:12px">⚠️</div>
  <div class="fs-title" id="err-title">Xatolik</div>
  <div class="fs-sub" id="err-msg"></div>
  <div id="err-detail" class="err-code" style="display:none"></div>
  <button class="btn" onclick="location.reload()">Qayta urinish</button>
</div>

<div id="viewer">
  <div class="topbar">
    <div class="topbar-row1">
      <div class="brand-name" id="brand-name">ARCHVIEW</div>
      <div class="proj-name" id="proj-name">—</div>
    </div>
    <div class="topbar-row2">
      <div class="owner-name">
        <div class="owner-icon">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent)">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <span id="owner-name">—</span>
      </div>
      <div class="topbar-stats">
        <div class="tstat"><div class="tstat-val" id="s-area">—</div><div class="tstat-lbl">m²</div></div>
        <div class="tstat"><div class="tstat-val" id="s-rooms">—</div><div class="tstat-lbl">xona</div></div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="floor-tabs" id="floor-tabs"></div>
    <div class="view-toggle" id="view-toggle" style="display:none">
      <button class="view-btn active" id="btn-25d" onclick="setView('2.5d')">2.5D</button>
      <button class="view-btn" id="btn-2d" onclick="setView('2d')">2D</button>
    </div>
  </div>

  <div class="canvas-area" id="canvas-area">
    <canvas id="cv"></canvas>
    <div class="zoom-hint" id="zoom-hint">✦ Ikki barmoq bilan kattalashtiring</div>
  </div>

  <div class="room-strip" id="room-strip"></div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-inner" id="drawer-inner"></div>
</div>

<script>
// ================================================================
const ISO_X=0.866,ISO_Y=0.5;
let WALL_H=36,UNIT=52;
let allFloors=[],currentFloorIdx=0,rooms=[];
let selected=null,hovered=null;
let viewMode='2.5d',isPremium=false;
let panX=0,panY=0,scale=1;
let isPanning=false,lastTouch={x:0,y:0},lastPinchDist=0;
const dpr=Math.min(devicePixelRatio||1,2);
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

// ---- SCREENS ----
function showScreen(id){
  ['screen-loading','screen-error','viewer'].forEach(s=>{
    const el=document.getElementById(s);
    el.style.display=s===id?(s==='viewer'?'flex':'flex'):'none';
  });
}
function showError(t,m,d=''){
  document.getElementById('err-title').textContent=t;
  document.getElementById('err-msg').textContent=m;
  const det=document.getElementById('err-detail');
  if(d){det.textContent=d;det.style.display='block';}else det.style.display='none';
  showScreen('screen-error');
}

// ---- INIT ----
async function init(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){showError("ID ko'rsatilmagan","URL misoli:","sayt.vercel.app/?id=abdullayev-047");return;}
  document.getElementById('loading-msg').textContent='manifest.json yuklanmoqda...';
  let project=null;
  try{
    const res=await fetch('/manifest.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const manifest=await res.json();
    project=manifest[id];
    if(!project){showError('"'+id+'" topilmadi','Mavjud loyihalar:',Object.keys(manifest).join('\n'));return;}
  }catch(e){showError('manifest.json yuklanmadi','','Xato: '+e.message);return;}

  applyBrand(project);
  isPremium=project.premium||false;
  document.getElementById('loading-msg').textContent='"'+project.name+'" yuklanmoqda...';

  try{
    let data=null;
    try{
      const res=await fetch(project.url);
      if(res.status===401||res.status===403)throw new Error('PERM');
      if(!res.ok)throw new Error('HTTP '+res.status);
      data=await res.json();
    }catch(e){
      const proxy='https://api.allorigins.win/raw?url='+encodeURIComponent(project.url);
      const r2=await fetch(proxy);
      if(!r2.ok)throw new Error('CORS');
      data=await r2.json();
    }
    renderProject(data,project);
  }catch(e){
    showError("Yuklab bo'lmadi","Firebase Rules:\nallow read: if true;",'Xato: '+e.message);
  }
}

// ---- BRAND ----
function applyBrand(p){
  const b=p.brand||{};
  if(b.color)document.documentElement.style.setProperty('--accent',b.color);
  if(b.company)document.getElementById('brand-name').textContent=b.company.toUpperCase();
}

// ---- RENDER ----
function renderProject(data,project){
  allFloors=data.floors&&data.floors.length>0
    ?data.floors:[{id:'f1',label:'Reja',rooms:data.rooms||[]}];

  document.getElementById('proj-name').textContent=data.name||project.name||'—';
  document.getElementById('owner-name').textContent=project.owner||'—';
  document.getElementById('s-area').textContent=data.totalArea||'—';
  const total=allFloors.reduce((s,f)=>s+(f.rooms||[]).length,0);
  document.getElementById('s-rooms').textContent=total;

  buildFloorTabs();
  if(isPremium)document.getElementById('view-toggle').style.display='flex';

  switchFloor(0);
  showScreen('viewer');
  setTimeout(()=>{resizeCanvas();fitToScreen();},80);
}

// ---- FLOORS ----
function buildFloorTabs(){
  const tabs=document.getElementById('floor-tabs');
  tabs.innerHTML='';
  if(allFloors.length<=1){tabs.style.display='none';return;}
  allFloors.forEach((f,i)=>{
    const btn=document.createElement('button');
    btn.className='floor-tab'+(i===0?' active':'');
    btn.textContent=f.label||('Qavat '+(i+1));
    btn.onclick=()=>switchFloor(i);
    btn.id='ftab-'+i;
    tabs.appendChild(btn);
  });
}
function switchFloor(idx){
  currentFloorIdx=idx;
  rooms=allFloors[idx].rooms||[];
  selected=null;hovered=null;
  document.querySelectorAll('.floor-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  closeDrawer();buildRoomStrip();fitToScreen();draw();
}

// ---- VIEW TOGGLE ----
function setView(mode){
  viewMode=mode;
  document.getElementById('btn-25d').classList.toggle('active',mode==='2.5d');
  document.getElementById('btn-2d').classList.toggle('active',mode==='2d');
  fitToScreen();draw();
}

// ---- ROOM STRIP ----
function buildRoomStrip(){
  const strip=document.getElementById('room-strip');
  strip.innerHTML='';
  rooms.forEach(r=>{
    const el=document.createElement('div');
    el.className='room-chip';el.id='chip-'+r.id;
    el.innerHTML=`<div class="room-chip-dot" style="background:${r.color}"></div>
      <div class="room-chip-name">${r.name}</div>
      <div class="room-chip-area">${r.area}</div>`;
    el.onclick=()=>selectRoom(r.id);
    strip.appendChild(el);
  });
}

// ---- DRAWER ----
function openDrawer(r){
  const inner=document.getElementById('drawer-inner');
  inner.innerHTML=`
    <button class="drawer-close" onclick="closeDrawer()">×</button>
    <div class="drawer-accent" style="background:${r.color}"></div>
    <div class="drawer-name">${r.name}</div>
    <div class="drawer-type">${r.type}</div>
    <div class="drawer-grid">
      <div class="drawer-cell"><div class="drawer-cell-lbl">Maydon</div><div class="drawer-cell-val" style="color:${r.color}">${r.area}</div></div>
      <div class="drawer-cell"><div class="drawer-cell-lbl">O'lcham</div><div class="drawer-cell-val">${r.size}</div></div>
      <div class="drawer-cell"><div class="drawer-cell-lbl">Deraza</div><div class="drawer-cell-val">${r.windows}</div></div>
      <div class="drawer-cell"><div class="drawer-cell-lbl">Eshik</div><div class="drawer-cell-val">${r.doors}</div></div>
    </div>
    <div class="drawer-desc">${r.desc}</div>`;
  document.getElementById('drawer').classList.add('show');
  document.getElementById('drawer-overlay').classList.add('show');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('show');
  document.getElementById('drawer-overlay').classList.remove('show');
}

function selectRoom(id){
  selected=id;
  document.querySelectorAll('.room-chip').forEach(el=>el.classList.remove('active'));
  document.getElementById('chip-'+id)?.classList.add('active');
  document.getElementById('chip-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  const r=rooms.find(x=>x.id===id);
  if(r)openDrawer(r);
  draw();
}

// ================================================================
// DRAW
// ================================================================
function wh(){return WALL_H*scale;}
function toIso(gx,gy){return{x:panX+(gx-gy)*UNIT*scale*ISO_X,y:panY+(gx+gy)*UNIT*scale*ISO_Y};}
function toFlat(gx,gy){return{x:panX+gx*UNIT*scale,y:panY+gy*UNIT*scale};}

function draw(){
  const W=cv.width/dpr,H=cv.height/dpr;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#0f0f10';ctx.fillRect(0,0,cv.width,cv.height);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=.5;
  for(let i=0;i<=14;i++){const a=viewMode==='2d'?toFlat(i,0):toIso(i,0),b=viewMode==='2d'?toFlat(i,12):toIso(i,12);ctx.beginPath();ctx.moveTo(a.x,a.y+(viewMode==='2d'?0:wh()));ctx.lineTo(b.x,b.y+(viewMode==='2d'?0:wh()));ctx.stroke();}
  for(let j=0;j<=12;j++){const a=viewMode==='2d'?toFlat(0,j):toIso(0,j),b=viewMode==='2d'?toFlat(14,j):toIso(14,j);ctx.beginPath();ctx.moveTo(a.x,a.y+(viewMode==='2d'?0:wh()));ctx.lineTo(b.x,b.y+(viewMode==='2d'?0:wh()));ctx.stroke();}
  [...rooms].sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy)).forEach(r=>{
    if(viewMode==='2d')drawRoom2D(r,r.id===hovered,r.id===selected);
    else drawRoom25D(r,r.id===hovered,r.id===selected);
  });
}

// ---- 2.5D ----
function drawRoom25D(r,isHov,isSel){
  const{gx,gy,gw,gh}=r;
  const lift=(isSel?7:isHov?3:0)*scale;
  const al=isSel?'ff':isHov?'ee':'bb';
  const p00=toIso(gx,gy),p10=toIso(gx+gw,gy),p11=toIso(gx+gw,gy+gh),p01=toIso(gx,gy+gh);
  const poly=(pts,fill,stroke)=>{
    ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
    ctx.closePath();ctx.fillStyle=fill;ctx.fill();
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}
  };
  const L=p=>({x:p.x,y:p.y-lift});
  const sc=isSel?r.color:null;
  poly([L(p00),L(p10),L(p11),L(p01)],r.floor+al,sc);
  poly([L(p01),L(p11),{x:p11.x,y:p11.y-lift+wh()},{x:p01.x,y:p01.y-lift+wh()}],r.wallLeft+al,sc);
  poly([L(p10),L(p11),{x:p11.x,y:p11.y-lift+wh()},{x:p10.x,y:p10.y-lift+wh()}],r.wallRight+al,sc);
  const T=p=>({x:p.x,y:p.y-lift-wh()});
  poly([T(p00),T(p10),T(p11),T(p01)],r.wallTop+al,sc);
  [p00,p10,p11,p01].forEach(p=>{ctx.beginPath();ctx.moveTo(p.x,p.y-lift-wh());ctx.lineTo(p.x,p.y-lift);ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=.6;ctx.stroke();});
  const w1=toIso(gx+gw*.2,gy),w2=toIso(gx+gw*.8,gy);
  ctx.beginPath();ctx.moveTo(w1.x,w1.y-lift-wh()*.2);ctx.lineTo(w1.x,w1.y-lift-wh()*.8);ctx.lineTo(w2.x,w2.y-lift-wh()*.8);ctx.lineTo(w2.x,w2.y-lift-wh()*.2);
  ctx.strokeStyle='rgba(86,180,211,0.55)';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='rgba(86,180,211,0.1)';ctx.fill();
  const cx=(p00.x+p10.x+p11.x+p01.x)/4,cy=(p00.y+p10.y+p11.y+p01.y)/4-lift;
  const fs=Math.max(8,Math.min(13,UNIT*scale*.17));
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`600 ${fs}px Syne,sans-serif`;ctx.fillStyle=isSel?'#fff':'rgba(255,255,255,0.85)';ctx.fillText(r.name,cx,cy-fs*.6);
  ctx.font=`300 ${fs*.85}px Outfit,sans-serif`;ctx.fillStyle=isSel?r.color:'rgba(255,255,255,0.4)';ctx.fillText(r.area,cx,cy+fs*.7);
  ctx.restore();
}

// ---- 2D + JIHOZLAR ----
function drawRoom2D(r,isHov,isSel){
  const{gx,gy,gw,gh}=r;
  const p00=toFlat(gx,gy),p10=toFlat(gx+gw,gy),p11=toFlat(gx+gw,gy+gh),p01=toFlat(gx,gy+gh);
  const al=isSel?.22:isHov?.14:.07;
  // fill
  ctx.beginPath();[p00,p10,p11,p01].forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.closePath();ctx.fillStyle=r.color+(Math.round(al*255).toString(16).padStart(2,'0'));ctx.fill();
  // devor
  ctx.strokeStyle='rgba(240,237,230,0.65)';ctx.lineWidth=3*scale;
  [[p00,p10],[p10,p11],[p11,p01],[p01,p00]].forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();});
  // border
  ctx.strokeStyle=isSel?r.color:r.color+'44';ctx.lineWidth=isSel?2:1;
  ctx.beginPath();[p00,p10,p11,p01].forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.stroke();
  // deraza (yuqori devor)
  const wx=UNIT*scale*gw*.25;
  ctx.strokeStyle='rgba(86,180,211,0.9)';ctx.lineWidth=3*scale;
  ctx.beginPath();ctx.moveTo(p00.x+wx,p00.y);ctx.lineTo(p10.x-wx,p10.y);ctx.stroke();
  // deraza oyna
  ctx.fillStyle='rgba(86,180,211,0.15)';
  ctx.fillRect(p00.x+wx,p00.y-1.5*scale,p10.x-wx-(p00.x+wx),3*scale);

  // ESHIK yoyi (chap devoriga)
  const dw=0.9*UNIT*scale;
  const dx=p01.x,dy=p01.y-dw;
  ctx.beginPath();ctx.moveTo(p01.x,p01.y);ctx.lineTo(p01.x,p01.y-dw);
  ctx.strokeStyle='rgba(200,160,100,0.8)';ctx.lineWidth=2*scale;ctx.stroke();
  ctx.beginPath();ctx.arc(p01.x,p01.y,dw,Math.PI*1.5,Math.PI*2);
  ctx.strokeStyle='rgba(200,160,100,0.5)';ctx.lineWidth=1*scale;ctx.setLineDash([3*scale,2*scale]);ctx.stroke();ctx.setLineDash([]);

  // label
  const cx=(p00.x+p11.x)/2,cy=(p00.y+p11.y)/2;
  const fs=Math.max(8,Math.min(13,UNIT*scale*.17));
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`600 ${fs}px Syne,sans-serif`;ctx.fillStyle=isSel?'#fff':'rgba(255,255,255,0.85)';ctx.fillText(r.name,cx,cy-fs*.6);
  ctx.font=`300 ${fs*.85}px Outfit,sans-serif`;ctx.fillStyle=isSel?r.color:'rgba(255,255,255,0.4)';ctx.fillText(r.area,cx,cy+fs*.7);
  ctx.restore();

  // JIHOZLAR
  if(r.furniture&&viewMode==='2d'){
    r.furniture.forEach(f=>drawFurniture(f,r.color));
  }
}

// ---- JIHOZLAR ----
function drawFurniture(f,roomColor){
  const u=UNIT*scale;
  const x=panX+f.x*u, y=panY+f.y*u;
  const fw=f.w*u, fh=f.h*u;
  ctx.save();
  ctx.strokeStyle=roomColor+'99';
  ctx.fillStyle=roomColor+'22';
  ctx.lineWidth=1*scale;

  if(f.type==='bed'){
    // karavot asosi
    ctx.beginPath();ctx.roundRect(x,y,fw,fh,3*scale);ctx.fill();ctx.stroke();
    // yostiq
    ctx.fillStyle=roomColor+'44';
    ctx.beginPath();ctx.roundRect(x+fw*.1,y+fh*.05,fw*.35,fh*.3,2*scale);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(x+fw*.55,y+fh*.05,fw*.35,fh*.3,2*scale);ctx.fill();ctx.stroke();
    // bosh qismi
    ctx.fillStyle=roomColor+'55';
    ctx.beginPath();ctx.roundRect(x,y,fw,fh*.18,2*scale);ctx.fill();ctx.stroke();
  }
  else if(f.type==='sofa'){
    ctx.beginPath();ctx.roundRect(x,y,fw,fh,3*scale);ctx.fill();ctx.stroke();
    // o'rindiq qismlari
    ctx.fillStyle=roomColor+'44';
    const sw=fw/3;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.roundRect(x+i*sw+1*scale,y+fh*.35,sw-2*scale,fh*.6,2*scale);ctx.fill();}
    // suyanchiq
    ctx.fillStyle=roomColor+'55';ctx.beginPath();ctx.roundRect(x,y,fw,fh*.3,2*scale);ctx.fill();ctx.stroke();
  }
  else if(f.type==='table'){
    ctx.beginPath();ctx.roundRect(x,y,fw,fh,2*scale);ctx.fill();ctx.stroke();
    // oyoqlar
    ctx.fillStyle=roomColor+'55';
    const leg=3*scale;
    [[x+leg,y+leg],[x+fw-leg*2,y+leg],[x+leg,y+fh-leg*2],[x+fw-leg*2,y+fh-leg*2]].forEach(([lx,ly])=>{
      ctx.beginPath();ctx.roundRect(lx,ly,leg,leg,1);ctx.fill();
    });
  }
  else if(f.type==='chair'){
    ctx.beginPath();ctx.roundRect(x,y,fw,fh,3*scale);ctx.fill();ctx.stroke();
    ctx.fillStyle=roomColor+'55';ctx.beginPath();ctx.roundRect(x,y,fw,fh*.25,2*scale);ctx.fill();
  }
  else if(f.type==='bathtub'){
    ctx.beginPath();ctx.roundRect(x,y,fw,fh,5*scale);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(86,180,211,0.2)';
    ctx.beginPath();ctx.ellipse(x+fw/2,y+fh/2,fw*.38,fh*.35,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(86,180,211,0.5)';ctx.stroke();
  }
  else if(f.type==='wc'){
    ctx.beginPath();ctx.ellipse(x+fw/2,y+fh*.6,fw*.42,fh*.38,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(x+fw*.1,y,fw*.8,fh*.35,3*scale);ctx.fill();ctx.stroke();
  }
  else if(f.type==='sink'){
    ctx.beginPath();ctx.roundRect(x,y,fw,fh,3*scale);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(86,180,211,0.2)';
    ctx.beginPath();ctx.ellipse(x+fw/2,y+fh/2,fw*.35,fh*.35,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+fw/2,y+fh/2,2*scale,0,Math.PI*2);ctx.fillStyle=roomColor+'88';ctx.fill();
  }
  else if(f.type==='wardrobe'){
    ctx.beginPath();ctx.roundRect(x,y,fw,fh,2*scale);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+fw/2,y);ctx.lineTo(x+fw/2,y+fh);ctx.strokeStyle=roomColor+'66';ctx.lineWidth=1*scale;ctx.stroke();
    // tutqich
    [[x+fw*.25,y+fh/2],[x+fw*.75,y+fh/2]].forEach(([hx,hy])=>{
      ctx.beginPath();ctx.arc(hx,hy,2*scale,0,Math.PI*2);ctx.fillStyle=roomColor+'88';ctx.fill();
    });
  }
  else if(f.type==='kitchen'){
    ctx.beginPath();ctx.roundRect(x,y,fw,fh,2*scale);ctx.fill();ctx.stroke();
    // plita doiralari
    const r2=fw*.12;
    [[.25,.3],[.65,.3],[.25,.7],[.65,.7]].forEach(([rx,ry])=>{
      ctx.beginPath();ctx.arc(x+fw*rx,y+fh*ry,r2,0,Math.PI*2);
      ctx.strokeStyle=roomColor+'77';ctx.lineWidth=1*scale;ctx.stroke();
    });
  }
  ctx.restore();
}

// ---- FIT ----
function fitToScreen(){
  if(!rooms.length)return;
  const area=document.getElementById('canvas-area');
  const W=area.clientWidth,H=area.clientHeight;
  const maxGx=Math.max(...rooms.map(r=>r.gx+r.gw));
  const maxGy=Math.max(...rooms.map(r=>r.gy+r.gh));
  if(viewMode==='2d'){
    const sx=(W-40)/(maxGx*UNIT),sy=(H-40)/(maxGy*UNIT);
    scale=Math.min(sx,sy,1.6);
    panX=(W-maxGx*UNIT*scale)/2;panY=(H-maxGy*UNIT*scale)/2;
  } else {
    const isoW=(maxGx+maxGy)*UNIT*ISO_X,isoH=(maxGx+maxGy)*UNIT*ISO_Y+WALL_H+20;
    const sx=(W-40)/isoW,sy=(H-60)/isoH;
    scale=Math.min(sx,sy,1.6);
    panX=W/2-(maxGy-maxGx)*UNIT*scale*ISO_X/2;
    panY=(H-isoH*scale)/2+10;
  }
  draw();
}

// ---- CANVAS RESIZE ----
function resizeCanvas(){
  const area=document.getElementById('canvas-area');
  const W=area.clientWidth,H=area.clientHeight;
  cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
}

// ---- HIT TEST ----
function getPos(e){const rect=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-rect.left,y:t.clientY-rect.top};}
function hitTest(px,py){
  for(let i=rooms.length-1;i>=0;i--){
    const r=rooms[i];
    let pts;
    if(viewMode==='2d'){pts=[toFlat(r.gx,r.gy),toFlat(r.gx+r.gw,r.gy),toFlat(r.gx+r.gw,r.gy+r.gh),toFlat(r.gx,r.gy+r.gh)];}
    else{
      const lift=(r.id===selected?7:0)*scale;
      const fp=[toIso(r.gx,r.gy),toIso(r.gx+r.gw,r.gy),toIso(r.gx+r.gw,r.gy+r.gh),toIso(r.gx,r.gy+r.gh)];
      const tp=fp.map(p=>({x:p.x,y:p.y-lift-wh()}));
      if(polyHit(px,py,fp)||polyHit(px,py,tp))return r.id;
      continue;
    }
    if(polyHit(px,py,pts))return r.id;
  }
  return null;
}
function polyHit(px,py,pts){
  let inside=false;
  for(let a=0,b=pts.length-1;a<pts.length;b=a++){
    const xi=pts[a].x,yi=pts[a].y,xj=pts[b].x,yj=pts[b].y;
    if(((yi>py)!=(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

// ---- TOUCH ----
const ca=document.getElementById('canvas-area');
ca.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    isPanning=false;
    document.getElementById('zoom-hint').style.opacity='0';
  } else if(e.touches.length===1){
    isPanning=true;
    lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
},{passive:false});

ca.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const delta=dist/lastPinchDist;
    const rect=ca.getBoundingClientRect();
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
    panX=(panX-mx)*delta+mx;panY=(panY-my)*delta+my;
    scale=Math.max(0.3,Math.min(5,scale*delta));
    lastPinchDist=dist;draw();
  } else if(e.touches.length===1&&isPanning){
    panX+=e.touches[0].clientX-lastTouch.x;
    panY+=e.touches[0].clientY-lastTouch.y;
    lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};draw();
  }
},{passive:false});

ca.addEventListener('touchend',e=>{
  if(e.changedTouches.length===1&&isPanning&&e.touches.length===0){
    const rect=ca.getBoundingClientRect();
    const x=e.changedTouches[0].clientX-rect.left,y=e.changedTouches[0].clientY-rect.top;
    const dx=Math.abs(x-lastTouch.x),dy=Math.abs(y-lastTouch.y);
    if(dx<8&&dy<8){
      const h=hitTest(x,y);
      if(h)selectRoom(h);
      else{selected=null;document.querySelectorAll('.room-chip').forEach(el=>el.classList.remove('active'));closeDrawer();draw();}
    }
  }
  isPanning=false;
},{passive:false});

cv.addEventListener('mousemove',e=>{const{x,y}=getPos(e);const h=hitTest(x,y);if(h!==hovered){hovered=h;draw();}cv.style.cursor=h?'pointer':'default';});
cv.addEventListener('mouseleave',()=>{hovered=null;draw();});
cv.addEventListener('click',e=>{const{x,y}=getPos(e);const h=hitTest(x,y);if(h)selectRoom(h);else{selected=null;document.querySelectorAll('.room-chip').forEach(el=>el.classList.remove('active'));closeDrawer();draw();}});
ca.addEventListener('wheel',e=>{e.preventDefault();const rect=ca.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;const d=e.deltaY>0?.88:1.14;panX=(panX-mx)*d+mx;panY=(panY-my)*d+my;scale=Math.max(0.3,Math.min(5,scale*d));draw();},{passive:false});

window.addEventListener('resize',()=>{resizeCanvas();fitToScreen();});
init();
</script>
