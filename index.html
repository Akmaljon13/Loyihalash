<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchView</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--bg2:#161617;--bg3:#1e1e20;
  --border:#2a2a2e;--accent:#e8c97a;
  --text:#f0ede6;--text2:#8a8680;--text3:#4a4845;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* ERROR / LOADING */
.center-box{text-align:center;max-width:400px}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-icon{font-size:40px;margin-bottom:16px;opacity:.5}
.center-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.center-sub{font-size:13px;color:var(--text2);line-height:1.6}

/* VIEWER */
#viewer{display:none;width:100%;max-width:900px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.logo{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--accent)}
.proj-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.proj-meta{font-size:11px;color:var(--text2);margin-top:2px}
.stats{display:flex;gap:12px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center}
.stat-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:1px}

.layout{display:flex;gap:16px}
.canvas-wrap{flex:1;background:var(--bg2);border-radius:14px;border:1px solid var(--border);overflow:hidden;position:relative}
canvas{display:block;width:100%;cursor:pointer}

.panel{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}

.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.info-card.has-data{align-items:flex-start;text-align:left}
.idle-hint{font-size:12px;color:var(--text3);line-height:1.6}
.room-accent{width:36px;height:4px;border-radius:2px;margin-bottom:12px}
.room-name-big{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:3px}
.room-type-sm{font-size:11px;color:var(--text2);margin-bottom:14px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-bottom:12px}
.info-cell{background:var(--bg3);border-radius:8px;padding:8px 10px}
.info-cell-lbl{font-size:10px;color:var(--text3);letter-spacing:.5px;margin-bottom:3px}
.info-cell-val{font-size:13px;font-weight:500}
.info-desc{font-size:12px;color:var(--text2);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;width:100%}

.room-list{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.room-list-title{font-size:10px;color:var(--text3);letter-spacing:1px;padding:12px 14px 8px;text-transform:uppercase;font-weight:500}
.room-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;border-top:1px solid var(--border)}
.room-item:hover{background:var(--bg3)}
.room-item.active{background:rgba(232,201,122,.06)}
.room-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.room-item-name{font-size:13px;font-weight:500;flex:1}
.room-item-area{font-size:11px;color:var(--accent)}

.preview-img{width:100%;border-radius:10px;object-fit:cover;max-height:120px;background:var(--bg3);display:block}

@media(max-width:640px){
  .layout{flex-direction:column}
  .panel{width:100%}
  .stats{display:none}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="center-box" id="screen-loading">
  <div class="spinner"></div>
  <div class="center-title">Yuklanmoqda</div>
  <div class="center-sub" id="loading-msg">Ma'lumotlar olinmoqda...</div>
</div>

<!-- ERROR -->
<div class="center-box" id="screen-error" style="display:none">
  <div class="error-icon">⚠</div>
  <div class="center-title" id="err-title">Xatolik</div>
  <div class="center-sub" id="err-msg"></div>
</div>

<!-- VIEWER -->
<div id="viewer">
  <div class="topbar">
    <div class="logo">ARCHVIEW</div>
    <div>
      <div class="proj-name" id="proj-name">—</div>
      <div class="proj-meta" id="proj-meta">—</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-area">—</div><div class="stat-lbl">Maydon</div></div>
      <div class="stat"><div class="stat-val" id="s-rooms">—</div><div class="stat-lbl">Xona</div></div>
    </div>
  </div>

  <div class="layout">
    <div class="canvas-wrap">
      <canvas id="cv"></canvas>
    </div>
    <div class="panel">
      <!-- Preview image -->
      <img id="preview-img" class="preview-img" style="display:none" alt="preview">

      <!-- Room info -->
      <div class="info-card" id="info-card">
        <div class="idle-hint">Xonaga bosing<br>ma'lumot ko'rish uchun</div>
      </div>

      <!-- Room list -->
      <div class="room-list">
        <div class="room-list-title">Xonalar</div>
        <div id="room-list-body"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// FIREBASE CONFIG — o'zingiznikini yozing
// ============================================================
const FIREBASE_BUCKET = 'YOUR_PROJECT_ID.appspot.com';
// ^^^^^ Firebase console > Storage > Bucket nomini yozing

function firebaseUrl(projectId, filename) {
  const path = encodeURIComponent(`${projectId}/${filename}`);
  return `https://firebasestorage.googleapis.com/v0/b/${FIREBASE_BUCKET}/o/${path}?alt=media`;
}
// ============================================================

const UNIT = 55, ISO_X = 0.866, ISO_Y = 0.5, WALL_H = 38;
let OX = 300, OY = 60;
let hovered = null, selected = null;
let rooms = [], dpr = devicePixelRatio || 1;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ---- SCREENS ----
function show(id) {
  ['screen-loading','screen-error','viewer'].forEach(s => {
    document.getElementById(s).style.display = s === id ? (s==='viewer'?'block':'flex') : 'none';
  });
}
function showError(title, msg) {
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
  show('screen-error');
}

// ---- MAIN ----
async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if (!id) {
    showError("ID ko'rsatilmagan", "URL da ?id=abdullayev-047 kabi loyiha ID si bo'lishi kerak.");
    return;
  }

  document.getElementById('loading-msg').textContent = `"${id}" yuklanmoqda...`;

  try {
    // 1. data.json olish
    const res = await fetch(firebaseUrl(id, 'data.json'));
    if (!res.ok) throw new Error(`Loyiha topilmadi: ${id}`);
    const data = await res.json();

    // 2. Preview image (agar bo'lsa)
    const img = document.getElementById('preview-img');
    const imgUrl = firebaseUrl(id, 'preview.jpg');
    fetch(imgUrl).then(r => {
      if (r.ok) { img.src = imgUrl; img.style.display = 'block'; }
    }).catch(()=>{});

    // 3. Render
    renderProject(data, id);

  } catch(e) {
    showError("Xatolik yuz berdi", e.message);
  }
}

function renderProject(data, id) {
  rooms = data.rooms || [];

  document.getElementById('proj-name').textContent = data.name || id;
  document.getElementById('proj-meta').textContent = data.address || ('Loyiha: ' + id);
  document.getElementById('s-area').textContent = data.totalArea || '—';
  document.getElementById('s-rooms').textContent = rooms.length;

  buildRoomList();
  resizeCanvas();
  show('viewer');
}

// ---- ROOM LIST ----
function buildRoomList() {
  const body = document.getElementById('room-list-body');
  body.innerHTML = '';
  rooms.forEach(r => {
    const el = document.createElement('div');
    el.className = 'room-item';
    el.id = 'li-' + r.id;
    el.innerHTML = `
      <div class="room-dot" style="background:${r.color}"></div>
      <div class="room-item-name">${r.name}</div>
      <div class="room-item-area">${r.area}</div>`;
    el.onclick = () => selectRoom(r.id);
    body.appendChild(el);
  });
}

// ---- ISO DRAW ----
function toIso(gx, gy) {
  return {
    x: OX + (gx - gy) * UNIT * ISO_X,
    y: OY + (gx + gy) * UNIT * ISO_Y
  };
}

function drawRoom(r, isHov, isSel) {
  const { gx, gy, gw, gh } = r;
  const lift = isSel ? 6 : isHov ? 3 : 0;
  const p = (x,y) => toIso(x,y);

  const p00=p(gx,gy), p10=p(gx+gw,gy), p11=p(gx+gw,gy+gh), p01=p(gx,gy+gh);
  const al = isSel ? 'ff' : isHov ? 'ee' : 'bb';

  // Floor
  ctx.beginPath();
  [p00,p10,p11,p01].forEach((pt,i)=>i?ctx.lineTo(pt.x,pt.y-lift):ctx.moveTo(pt.x,pt.y-lift));
  ctx.closePath();
  ctx.fillStyle = r.floor + al;
  ctx.fill();
  if(isSel){ ctx.strokeStyle=r.color; ctx.lineWidth=1.5; ctx.stroke(); }

  // Left wall
  const lpts = [p01,p11].map(pt=>({x:pt.x,y:pt.y-lift}));
  ctx.beginPath();
  ctx.moveTo(lpts[0].x,lpts[0].y);
  ctx.lineTo(lpts[1].x,lpts[1].y);
  ctx.lineTo(lpts[1].x,lpts[1].y+WALL_H);
  ctx.lineTo(lpts[0].x,lpts[0].y+WALL_H);
  ctx.closePath();
  ctx.fillStyle = r.wallLeft + al;
  ctx.fill();
  if(isSel){ ctx.strokeStyle=r.color; ctx.lineWidth=.8; ctx.stroke(); }

  // Right wall
  const rpts = [p10,p11].map(pt=>({x:pt.x,y:pt.y-lift}));
  ctx.beginPath();
  ctx.moveTo(rpts[0].x,rpts[0].y);
  ctx.lineTo(rpts[1].x,rpts[1].y);
  ctx.lineTo(rpts[1].x,rpts[1].y+WALL_H);
  ctx.lineTo(rpts[0].x,rpts[0].y+WALL_H);
  ctx.closePath();
  ctx.fillStyle = r.wallRight + al;
  ctx.fill();
  if(isSel){ ctx.strokeStyle=r.color; ctx.lineWidth=.8; ctx.stroke(); }

  // Top cap
  ctx.beginPath();
  [p00,p10,p11,p01].forEach((pt,i)=>i?ctx.lineTo(pt.x,pt.y-lift-WALL_H):ctx.moveTo(pt.x,pt.y-lift-WALL_H));
  ctx.closePath();
  ctx.fillStyle = r.wallTop + al;
  ctx.fill();
  if(isSel){ ctx.strokeStyle=r.color; ctx.lineWidth=.8; ctx.stroke(); }

  // Corner edges
  [p00,p10,p11,p01].forEach(pt=>{
    ctx.beginPath();
    ctx.moveTo(pt.x,pt.y-lift-WALL_H);
    ctx.lineTo(pt.x,pt.y-lift);
    ctx.strokeStyle='rgba(0,0,0,0.25)';
    ctx.lineWidth=.7;
    ctx.stroke();
  });

  // Window
  const wx1=toIso(gx+gw*.25,gy), wx2=toIso(gx+gw*.75,gy);
  ctx.beginPath();
  ctx.moveTo(wx1.x, wx1.y-lift-WALL_H*.25);
  ctx.lineTo(wx1.x, wx1.y-lift-WALL_H*.8);
  ctx.lineTo(wx2.x, wx2.y-lift-WALL_H*.8);
  ctx.lineTo(wx2.x, wx2.y-lift-WALL_H*.25);
  ctx.strokeStyle='rgba(100,180,220,0.55)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.fillStyle='rgba(100,180,220,0.1)';
  ctx.fill();

  // Label
  const cx=(p00.x+p10.x+p11.x+p01.x)/4;
  const cy=(p00.y+p10.y+p11.y+p01.y)/4-lift;
  ctx.save();
  ctx.font=`500 ${Math.max(9, UNIT*0.18)}px Syne,sans-serif`;
  ctx.fillStyle=isSel?'#fff':'rgba(255,255,255,0.75)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(r.name, cx, cy-6);
  ctx.font=`300 ${Math.max(8, UNIT*0.15)}px Outfit,sans-serif`;
  ctx.fillStyle=isSel?r.color:'rgba(255,255,255,0.4)';
  ctx.fillText(r.area, cx, cy+8);
  ctx.restore();
}

function draw() {
  const W=cv.width/dpr, H=cv.height/dpr;
  ctx.clearRect(0,0,cv.width,cv.height);

  // bg
  ctx.fillStyle='#0f0f10';
  ctx.fillRect(0,0,cv.width,cv.height);

  // grid
  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=.5;
  for(let i=0;i<=10;i++){
    const a=toIso(i,0),b=toIso(i,8);
    ctx.beginPath();ctx.moveTo(a.x,a.y+WALL_H);ctx.lineTo(b.x,b.y+WALL_H);ctx.stroke();
  }
  for(let j=0;j<=8;j++){
    const a=toIso(0,j),b=toIso(10,j);
    ctx.beginPath();ctx.moveTo(a.x,a.y+WALL_H);ctx.lineTo(b.x,b.y+WALL_H);ctx.stroke();
  }

  [...rooms].sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy))
    .forEach(r=>drawRoom(r, r.id===hovered, r.id===selected));
}

// ---- SELECT ROOM ----
function selectRoom(id) {
  selected = id;
  document.querySelectorAll('.room-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('li-'+id)?.classList.add('active');
  document.getElementById('li-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest'});

  const r = rooms.find(x=>x.id===id);
  if(!r) return;

  const card = document.getElementById('info-card');
  card.className = 'info-card has-data';
  card.innerHTML = `
    <div class="room-accent" style="background:${r.color}"></div>
    <div class="room-name-big">${r.name}</div>
    <div class="room-type-sm">${r.type}</div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-cell-lbl">MAYDON</div><div class="info-cell-val" style="color:${r.color}">${r.area}</div></div>
      <div class="info-cell"><div class="info-cell-lbl">O'LCHAM</div><div class="info-cell-val">${r.size}</div></div>
      <div class="info-cell"><div class="info-cell-lbl">DERAZA</div><div class="info-cell-val">${r.windows}</div></div>
      <div class="info-cell"><div class="info-cell-lbl">ESHIK</div><div class="info-cell-val">${r.doors}</div></div>
    </div>
    <div class="info-desc">${r.desc}</div>`;
  draw();
}

// ---- CANVAS RESIZE & EVENTS ----
function resizeCanvas() {
  const wrap = cv.parentElement;
  const W = wrap.clientWidth;
  const H = Math.max(320, Math.min(500, W*0.65));
  cv.width = W*dpr; cv.height = H*dpr;
  cv.style.height = H+'px';
  ctx.scale(dpr,dpr);

  // auto-fit
  if(rooms.length){
    const maxGx = Math.max(...rooms.map(r=>r.gx+r.gw));
    const maxGy = Math.max(...rooms.map(r=>r.gy+r.gh));
    const needed = (maxGx+maxGy)*UNIT*ISO_X + 80;
    OX = W/2;
    OY = 60;
    if(needed > W) OX = needed/2;
  }
  draw();
}

function hitTest(px, py) {
  for(let i=rooms.length-1;i>=0;i--){
    const r=rooms[i];
    const p=(x,y)=>toIso(x,y);
    const pts=[p(r.gx,r.gy),p(r.gx+r.gw,r.gy),p(r.gx+r.gw,r.gy+r.gh),p(r.gx,r.gy+r.gh)];
    if(polyHit(px,py,pts)) return r.id;
  }
  return null;
}

function polyHit(px,py,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!=(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

function getPos(e){
  const rect=cv.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX-rect.left, y:t.clientY-rect.top};
}

cv.addEventListener('mousemove',e=>{
  const {x,y}=getPos(e);
  const h=hitTest(x,y);
  if(h!==hovered){hovered=h;draw();}
  cv.style.cursor=h?'pointer':'default';
});
cv.addEventListener('mouseleave',()=>{hovered=null;draw();});
cv.addEventListener('click',e=>{
  const {x,y}=getPos(e);
  const h=hitTest(x,y);
  if(h) selectRoom(h);
  else { selected=null; document.getElementById('info-card').className='info-card'; document.getElementById('info-card').innerHTML='<div class="idle-hint">Xonaga bosing<br>ma\'lumot ko\'rish uchun</div>'; draw(); }
});
cv.addEventListener('touchstart',e=>{e.preventDefault();const {x,y}=getPos(e);const h=hitTest(x,y);if(h)selectRoom(h);},{passive:false});

window.addEventListener('resize',resizeCanvas);
init();
</script>
</body>
</html>
